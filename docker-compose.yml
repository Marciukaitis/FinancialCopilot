services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Pulling model llama3.2 (first run may take several minutes)..."
        ollama pull llama3.2
        echo "Model llama3.2 is ready."
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      LLM_TEMPERATURE: "0.0"
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80,http://localhost:8000
      CHROMA_PERSIST_DIRECTORY: /app/data/chroma
      CHROMA_COLLECTION_NAME: finance_documents
      DOCUMENTS_DIRECTORY: /app/data/documents
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "200"
      RETRIEVER_K: "4"
      CONVERSATION_HISTORY_TURNS: "6"
    volumes:
      - chroma_data:/app/data/chroma
      - documents_data:/app/data/documents
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  documents_data:
